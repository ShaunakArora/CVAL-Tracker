<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Class Valuation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-card {
            width: 100%;
            max-width: 500px;
            padding: 3rem 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .error-icon {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 1.5rem;
        }
        .brand-green { color: #28a745; }
        .brand-blue { color: #0d6efd; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h3 class="mb-3">Something Went Wrong</h3>
        <p class="text-muted mb-4">{{ error_message or "An internal server error occurred. Please try again later or contact support." }}</p>
        <div class="mb-4">
            <a href="/" class="btn btn-primary px-4"><i class="fas fa-home me-2"></i>Go to Login / Dashboard</a>
        </div>
        <hr>
        <div class="mt-3">
            <small class="text-muted"><span class="brand-green">Class</span><span class="brand-blue">Valuation</span> Vadodara Tracker</small>
        </div>
    </div>
</body>
</html>
